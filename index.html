    <script>
      (function(){var t=localStorage.getItem('theme');if(t==='light'){document.documentElement.classList.remove('dark');document.documentElement.classList.add('light')}})();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script
      src="https://unpkg.com/@vapi-ai/client-sdk-react/dist/embed/widget.umd.js"
      async
      type="text/javascript">
    </script>

    <vapi-widget
      id="vapi-widget"
      public-key="cf7a29ca-dd5e-49f6-b8dc-850c409ea9cd"
      assistant-id="59cad5a2-e2e3-4c3a-b7f5-77b8129c3a6e"
      mode="voice"

      size="compact"
      position="bottom-right"
      accent-color="#00a3ff"
      title="AI Support"
      cta-title="Talk to our AI"
      cta-subtitle="Instant answers, 24/7"
      start-button-text="Start Call"
      end-button-text="End Call"
      voice-show-transcript="true"
    ></vapi-widget>

    <script>
      function syncVapiTheme() {
        const widget = document.getElementById('vapi-widget');
        if (!widget) return;

        const isDark =
          document.documentElement.classList.contains('dark') ||
          document.documentElement.getAttribute('data-theme') === 'dark' ||
          document.body.classList.contains('dark') ||
          document.body.getAttribute('data-theme') === 'dark';

        widget.setAttribute('theme', isDark ? 'dark' : 'light');
      }

      syncVapiTheme();

      const observer = new MutationObserver(syncVapiTheme);
      observer.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ['class', 'data-theme']
      });
      observer.observe(document.body, {
        attributes: true,
        attributeFilter: ['class', 'data-theme']
      });
    </script>
  </body>
